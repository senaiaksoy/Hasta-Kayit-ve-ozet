<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasta Kayit ve Ozet</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Hasta Kayit ve Ozet</h1>

      <section class="card">
        <h2>Yeni Hasta Kaydi</h2>
        <form id="patient-form">
          <label>
            Ad Soyad
            <input type="text" id="fullName" required />
          </label>
          <label>
            Yas
            <input type="number" id="age" min="0" required />
          </label>
          <label>
            Sikayet
            <textarea id="complaint" rows="3" required></textarea>
          </label>
          <button type="submit">Kaydet</button>
        </form>
      </section>

      <section class="card">
        <h2>Gorusme Kaydi (Yerel)</h2>
        <p class="muted">
          Ses tarayicida kaydedilir ve sunucuya yuklenir. Metne cevirme icin bilgisayarda yerel
          <strong>whisper</strong> komutu gerekir (dis STT API yok).
        </p>

        <label>
          Hasta sec
          <select id="visit-patient"></select>
        </label>
        <label>
          Transkripsiyon dili
          <select id="visit-language">
            <option value="auto">Otomatik tespit</option>
            <option value="tr">Turkce</option>
            <option value="en">English</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="ar">Arabic</option>
          </select>
        </label>

        <div class="record-row">
          <button type="button" id="record-start">Kayda basla</button>
          <button type="button" id="record-stop" disabled>Kaydi durdur ve isle</button>
        </div>

        <div id="visit-status" class="muted"></div>

        <div class="visit-output">
          <label>
            Transkript
            <textarea id="visit-transcript" rows="6" readonly></textarea>
          </label>
          <label>
            Doktor ozeti
            <textarea id="visit-doctor" rows="8" readonly></textarea>
          </label>
          <label>
            Hasta bilgilendirme
            <textarea id="visit-patient-doc" rows="8" readonly></textarea>
          </label>
        </div>
      </section>

      <section class="card">
        <h2>Ozet</h2>
        <div id="summary"></div>
      </section>

      <section class="card">
        <h2>Hasta Listesi</h2>
        <label class="search-row">
          Ara (ad, sikayet veya yas)
          <input type="search" id="patient-search" placeholder="Ornek: bas agrisi" autocomplete="off" />
        </label>
        <ul id="patients"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
